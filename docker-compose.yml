version: '3.9'

services:
  proxy:
    image: caddy:2
    container_name: proxy
    ports:
      - '80:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - backend

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: web
    expose:
      - '80'
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ===== Redis：直接连同一 compose 网络里的 redis 服务 =====
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PREFIX=online-exam
      - SESSION_LIST_LIMIT=1000
      # ===== 数据库：连宿主机（Windows/macOS Docker Desktop 支持这个域名）=====
      - DB_HOST=host.docker.internal
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=exam_system
      # 你其它用到的 ENV 也可放到这里
    expose:
      - '3000'
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
 
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    ports:                # ← 新增：对外映射 6379
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped


volumes:
  redis-data:
