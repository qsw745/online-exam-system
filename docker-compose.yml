version: '3.9'

services:
  proxy:
    image: caddy:2
    container_name: proxy
    ports:
      - '80:80'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - backend

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: web
    expose:
      - '80'
    restart: unless-stopped

  backend-node:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: backend-node
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ===== Redis：直接连同一 compose 网络里的 redis 服务 =====
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PREFIX=online-exam
      - SESSION_LIST_LIMIT=1000
      # ===== 数据库：本地 compose 内置 MySQL，便于完整联调 =====
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=exam_system
      # 你其它用到的 ENV 也可放到这里
    expose:
      - '3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: ./apps/backend-java/Dockerfile
    container_name: backend
    environment:
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=exam_system
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PREFIX=online-exam
      - NODE_BACKEND_URL=http://backend-node:3000
      - NODE_PROXY_ENABLED=true
      - AUTH_STRICT_SESSION=false
    expose:
      - '3000'
    ports:
      - '127.0.0.1:8848:3000'
    depends_on:
      mysql:
        condition: service_healthy
      backend-node:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    profiles: ['tools']
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: build
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=exam_system
      - REDIS_URL=redis://redis:6379/0
      - REDIS_PREFIX=online-exam
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['sh', '-lc', 'pnpm -C apps/backend db:latest && pnpm -C apps/backend db:seed']

  mysql:
    image: mysql:8.0
    container_name: mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: exam_system
      TZ: Asia/Shanghai
    ports:
      - '127.0.0.1:3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -proot --silent']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:latest
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    ports:
      - '127.0.0.1:6380:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
